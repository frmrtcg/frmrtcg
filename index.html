<title>FRMR TCG</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:white;
}

header{
    padding:30px 20px;
    text-align:center;
}

header img{
    width:320px;
    max-width:90%;
}

.hero{
    width:90%;
    max-width:1200px;
    margin:auto;
    text-align:center;
}

.hero img{
    width:100%;
    border-radius:18px;
    box-shadow:0 10px 35px rgba(0,0,0,.45);
    margin-top:20px;
}

h1{
    margin-top:40px;
    font-size:42px;
}

p{
    margin-top:20px;
    font-size:22px;
    color:#d8d8d8;
    line-height:1.6;
}

.botao-loja{
    display:inline-block;
    margin-top:45px;
    background:#ff6a00;
    color:white;
    text-decoration:none;
    padding:22px 60px;
    border-radius:12px;
    font-size:28px;
    font-weight:bold;
    transition:.25s;
}

.botao-loja:hover{
    background:#ff8300;
    transform:scale(1.05);
}

.contato{
    margin-top:60px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:18px;
}

.contato a{
    text-decoration:none;
    color:white;
    background:#242424;
    padding:15px 28px;
    border-radius:10px;
    transition:.25s;
}

.contato a:hover{
    background:#333;
}

footer{
    margin-top:70px;
    background:#1d1d1d;
    padding:25px;
    text-align:center;
    color:#aaa;
}

@media(max-width:700px){

h1{
font-size:30px;
}

p{
font-size:18px;
}

.botao-loja{
font-size:22px;
padding:18px 30px;
}

}
